version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8420:8420"
    volumes:
      - cortex-data:/data
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
    environment:
      - CORTEX_DB_PATH=/data/cortex.db
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORTEX_AUTH_ENABLED=${CORTEX_AUTH_ENABLED:-false}
      - CORTEX_ADMIN_PASSWORD=${CORTEX_ADMIN_PASSWORD:-admin}
      - CORTEX_JWT_SECRET=${CORTEX_JWT_SECRET:-}
      - CORTEX_ENCRYPTION_KEY=${CORTEX_ENCRYPTION_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8420
      - NEXT_PUBLIC_WS_URL=ws://localhost:8420/ws
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cortex-data:
